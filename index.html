<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public GitHub Editor Demo</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            margin:40px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        textarea{
            width:100%;
            height:400px;
            font-size:16px;
            padding:10px;
            box-sizing:border-box;
            resize:vertical;
        }

        button{
            margin-top:15px;
            padding:12px 25px;
            font-size:16px;
            background:#238636;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#2ea043;
        }

        #status{
            margin-top:15px;
            font-weight:bold;
        }

        h2{
            margin-top:0;
        }
    </style>
</head>

<body>

<div class="container">

<h2>📝 Public GitHub File Editor</h2>

<p>
Edit the content below and click <b>Save</b>.
</p>

<textarea id="editor">
Welcome!

This is a demo editor.

Anyone can modify this text.
</textarea>

<br>

<button onclick="saveFile()">💾 Save</button>

<div id="status"></div>

</div>

<script>

async function saveFile(){

    const content=document.getElementById("editor").value;

    document.getElementById("status").innerHTML="Saving...";

    try{

        const response=await fetch("/save",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                content:content
            })

        });

        const result=await response.json();

        if(result.success){
            document.getElementById("status").innerHTML="✅ Saved successfully!";
        }
        else{
            document.getElementById("status").innerHTML="❌ "+result.message;
        }

    }
    catch(err){

        document.getElementById("status").innerHTML="❌ Cannot connect to server.";

    }

}

</script>

</body>
</html>
